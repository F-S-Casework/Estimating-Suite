function _libItemListHtml(items, catFilter, q){
  const f=(q||'').toLowerCase();
  const filtered=items.filter((it,i)=>(!catFilter||it.cat===catFilter)&&(!f||it.desc.toLowerCase().includes(f)||it.cat.toLowerCase().includes(f)));
  if(!filtered.length) return `<div style="text-align:center;padding:20px;color:#aaa;font-size:12px">No items match.</div>`;
  const grouped={};
  filtered.forEach((it,_)=>{ const i=items.indexOf(it); (grouped[it.cat]=grouped[it.cat]||[]).push({it,i}); });
  return Object.keys(grouped).sort().map(cat=>`
    <div style="font-size:10px;font-weight:700;color:#1E3A5F;text-transform:uppercase;letter-spacing:.6px;padding:8px 2px 4px">${esc(cat)}</div>
    ${grouped[cat].map(({it,i})=>`
      <div style="display:flex;align-items:center;padding:5px 8px;border:1px solid #eee;border-radius:4px;margin-bottom:4px;background:#fafcff">
        <div style="flex:1;font-size:12px">${esc(it.desc)}</div>
        <div style="font-size:11px;color:#2D6A8F;font-weight:600;min-width:60px;text-align:right;margin-right:8px">$${it.cost} / ${esc(it.uom)}</div>
        <button class="btn-sec" style="padding:3px 8px;font-size:11px" onclick="_renderLibModal('form',${i})">Edit</button>
      </div>`).join('')}`).join('');
}

function _filterLibList(q){
  const cat=(document.getElementById('lib-edit-cat')||{}).value||'';
  const el=document.getElementById('lib-item-list');
  if(el) el.innerHTML=_libItemListHtml(_libCache,cat,q);
}

function _filterLibListByCat(){
  const cat=(document.getElementById('lib-edit-cat')||{}).value||'';
  const q=(document.getElementById('lib-edit-search')||{}).value||'';
  const el=document.getElementById('lib-item-list');
  if(el) el.innerHTML=_libItemListHtml(_libCache,cat,q);
}

function _saveLibItem(editIdx){
  const cat=(document.getElementById('li-cat').value||'').trim();
  const desc=(document.getElementById('li-desc').value||'').trim();
  const cost=parseFloat(document.getElementById('li-cost').value)||0;
  const uom=(document.getElementById('li-uom').value||'').trim();
  if(!cat||!desc){ alert('Category and description are required.'); return; }
  const item={cat,desc,cost,uom};
  if(editIdx!==null && editIdx>=0) _libCache[editIdx]=item;
  else _libCache.push(item);
  _writeLibFile();
  rebuildLibCats(); filterLib();
  _renderLibModal('list',null);
}

function _deleteLibItem(idx){
  if(!confirm('Delete this library item?')) return;
  _libCache.splice(idx,1);
  _writeLibFile();
  rebuildLibCats(); filterLib();
  _renderLibModal('list',null);
}

// ══════════════════════════════════════════════════════════════
// AUTO-SAVE  (every 45s when dirty + file handle exists)
// ══════════════════════════════════════════════════════════════
setInterval(async()=>{
  if(_dirty && _fileHandle){
    try{
      const w = await _fileHandle.createWritable();
      await w.write(projectToJSON());
      await w.close();
      _dirty = false;
      updateTitle();
      const lbl = document.getElementById('autosave-lbl');
      if(lbl){
        const now = new Date();
        lbl.textContent = 'Autosaved ' + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        lbl.style.opacity = '1';
        setTimeout(()=>{ lbl.style.opacity = '0'; }, 3000);
      }
    } catch(e){ /* silent – user may have closed the picker */ }
  }
}, 45000);


// ══════════════════════════════════════════════════════════════
// DRAG-TO-REORDER ITEMS
// ══════════════════════════════════════════════════════════════
let _dragItemId = null;
let _dragSecId  = null;

function itemDragStart(e, itemId, secId){
  _dragItemId = itemId; _dragSecId = secId;
  e.dataTransfer.effectAllowed = 'move';
}

function itemDragOver(e, itemId, secId){
  if(_dragItemId===null || _dragItemId===itemId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function itemDrop(e, targetItemId, targetSecId){
  e.preventDefault();
  if(_dragItemId===null || _dragItemId===targetItemId) return;
  const srcSec  = findSection(_dragSecId);
  const tgtSec  = findSection(targetSecId);
  if(!srcSec||!tgtSec) return;
  const srcIdx  = srcSec.items.findIndex(i=>i.id===_dragItemId);
  const tgtIdx  = tgtSec.items.findIndex(i=>i.id===targetItemId);
  if(srcIdx<0||tgtIdx<0) return;
  pushUndo();
  const [item] = srcSec.items.splice(srcIdx,1);
  tgtSec.items.splice(tgtIdx,0,item);
  _dragItemId=null; _dragSecId=null;
  markDirty(); renderAreaView(); updateCostBar();
}

function itemDragEnd(){ _dragItemId=null; _dragSecId=null; }

// ══════════════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); saveProject(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='n'){ e.preventDefault(); newProject(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); undo(); }
});

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
render();
initContacts();
initLibFile();
</script>
<div id="client-dd" class="client-dd"></div>
<script>
// ── ADDRESS BOOK ─────────────────────────────────────────────────────────
// Contacts live in localStorage (always available, no permission needed).
// contacts.json on OneDrive is an optional sync target — pull from it when
// you want to pick up changes made on another machine.
const _LS_CONTACTS = 'fse-contacts';
let _contactsCache  = [];
let _contactsHandle = null;   // FileSystemFileHandle if user linked a file
let _contactsLinked = false;  // true = file link active this session

// Load from localStorage immediately — works every time, no permission needed
try { _contactsCache = JSON.parse(localStorage.getItem(_LS_CONTACTS)||'[]')||[]; }
catch(e){ _contactsCache=[]; }

// ── IndexedDB helpers (persist file handle reference across sessions) ─────
async function _idbGet(key){
  return new Promise(res=>{
    const req=indexedDB.open('fse-estimator',1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore('handles');
    req.onsuccess=e=>{
      const tx=e.target.result.transaction('handles','readonly');
      const g=tx.objectStore('handles').get(key);
      g.onsuccess=()=>res(g.result??null); g.onerror=()=>res(null);
    };
    req.onerror=()=>res(null);
  });
}
async function _idbSet(key,val){
  return new Promise(res=>{
    const req=indexedDB.open('fse-estimator',1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore('handles');
    req.onsuccess=e=>{
      const tx=e.target.result.transaction('handles','readwrite');
      tx.objectStore('handles').put(val,key);
      tx.oncomplete=()=>res(); tx.onerror=()=>res();
    };
    req.onerror=()=>res();
  });
}

// ── Startup: silently check if file handle is still accessible ───────────
async function initContacts(){
  // localStorage already loaded above — contacts work regardless of file
  const handle = await _idbGet('contacts');
  if(!handle) return;
  try{
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm==='granted'){
      // File is accessible this session — pull latest from it
      _contactsHandle=handle; _contactsLinked=true;
      await _readContactsFile();
    } else {
      // Permission needs a user gesture — remember handle for later sync
      _contactsHandle=handle; _contactsLinked=false;
      // localStorage contacts still fully usable — nothing to do here
    }
  }catch(e){ _contactsHandle=null; _contactsLinked=false; }
}

// ── Read file → update localStorage ──────────────────────────────────────
async function _readContactsFile(){
  if(!_contactsHandle) return;
  try{
    const file=await _contactsHandle.getFile();
    const data=JSON.parse(await file.text())||[];
    _contactsCache=data;
    localStorage.setItem(_LS_CONTACTS, JSON.stringify(data));
  }catch(e){ console.warn('Contacts read failed:',e); }
}

// ── Write localStorage → file (fire-and-forget, only when already linked) ─
async function _writeContactsFile(){
  if(!_contactsHandle || !_contactsLinked) return;
  try{
    const w=await _contactsHandle.createWritable();
    await w.write(JSON.stringify(_contactsCache,null,2));
    await w.close();
  }catch(e){ console.warn('Contacts write failed:',e); }
}

// ── Public API ────────────────────────────────────────────────────────────
function loadContacts(){ return _contactsCache; }
function saveContacts(arr){
  _contactsCache=arr;
  localStorage.setItem(_LS_CONTACTS, JSON.stringify(arr)); // always persist locally
  _writeContactsFile(); // also write to file if linked this session
}

// ── Reconnect existing file handle (user gesture required) ────────────────
async function _reconnectContactsFile(){
  if(!_contactsHandle) return;
  try{
    const perm=await _contactsHandle.requestPermission({mode:'readwrite'});
    if(perm==='granted'){
      _contactsLinked=true;
      await _readContactsFile(); // pull from file → updates localStorage
      _renderContactsModal('list',null);
    }
  }catch(e){ alert('Could not reconnect: '+e.message); }
}

// ── Link / create contacts file ───────────────────────────────────────────
async function _linkContactsFile(isNew){
  try{
    let handle;
    if(isNew){
      handle=await window.showSaveFilePicker({
        suggestedName:'contacts.json',
        types:[{description:'Contacts JSON',accept:{'application/json':['.json']}}]
      });
      // Write current localStorage contacts into the new file
      const w=await handle.createWritable();
      await w.write(JSON.stringify(_contactsCache,null,2));
      await w.close();
    } else {
      [handle]=await window.showOpenFilePicker({
        types:[{description:'Contacts JSON',accept:{'application/json':['.json']}}]
      });
      // Pull contacts from file → overwrite localStorage (file is source of truth)
      const file=await handle.getFile();
      const data=JSON.parse(await file.text())||[];
      _contactsCache=data;
      localStorage.setItem(_LS_CONTACTS, JSON.stringify(data));
    }
    _contactsHandle=handle; _contactsLinked=true;
    await _idbSet('contacts',handle);
    _renderContactsModal('list',null);
  }catch(e){ if(e.name!=='AbortError') alert('Could not link file: '+e.message); }
}

// ── Autocomplete dropdown on Client field ─────────────────────────────────
function showClientDD(inp){
  const contacts=loadContacts();
  const val=(inp.value||'').toLowerCase().trim();
  const dd=document.getElementById('client-dd');
  if(!dd) return;
  const matches=val?contacts.filter(c=>c.company.toLowerCase().includes(val)):contacts;
  if(!matches.length){ dd.style.display='none'; return; }
  const r=inp.getBoundingClientRect();
  dd.style.left=r.left+'px'; dd.style.top=(r.bottom+2)+'px';
  dd.style.width=Math.max(r.width,280)+'px';
  dd.innerHTML=matches.map(c=>`
    <div class="client-dd-item" onmousedown="applyContact('${c.id}')">
      <div class="client-dd-company">${esc(c.company)}</div>
      ${c.attention?`<div class="client-dd-attn">${esc(c.attention)}</div>`:''}
    </div>`).join('');
  dd.style.display='block';
}
function hideClientDD(){ setTimeout(()=>{ const d=document.getElementById('client-dd'); if(d) d.style.display='none'; },150); }

function applyContact(id){
  const c=loadContacts().find(x=>x.id===id); if(!c) return;
  if(c.company)   ST.info.client    =c.company;
  if(c.attention) ST.info.attention =c.attention;
  if(c.address)   ST.info.address   =c.address;
  markDirty();
  const dd=document.getElementById('client-dd'); if(dd) dd.style.display='none';
  renderInfo();
}

// ── Contacts modal ────────────────────────────────────────────────────────
function openContacts(){ _renderContactsModal('list',null); }

function _contactListHtml(contacts,filter){
  const f=(filter||'').toLowerCase();
  const shown=f?contacts.filter(c=>c.company.toLowerCase().includes(f)||(c.attention||'').toLowerCase().includes(f)):contacts;
  if(!shown.length) return `<div style="text-align:center;padding:30px;color:#aaa;font-size:13px">${contacts.length?'No matches':'No contacts yet — click + New Contact to add one.'}</div>`;
  return shown.map(c=>`
    <div class="contact-card">
      <div class="contact-card-info">
        <div class="contact-card-company">${esc(c.company)}</div>
        <div class="contact-card-detail">${[c.attention,c.address,c.phone,c.email].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="contact-card-actions">
        <button class="btn-sec" style="padding:4px 10px;font-size:11px" onclick="_renderContactsModal('form','${c.id}')">Edit</button>
        <button class="btn-danger" style="padding:4px 10px;font-size:11px" onclick="_deleteContact('${c.id}')">✕</button>
      </div>
    </div>`).join('');
}

function filterContactsList(val){
  const el=document.getElementById('contact-list-body');
  if(el) el.innerHTML=_contactListHtml(loadContacts(),val);
}

function _fileStatusHtml(){
  const count=_contactsCache.length;
  if(_contactsLinked){
    return `<div class="contacts-file-status linked">✅ Synced with OneDrive contacts.json — changes save automatically</div>`;
  } else if(_contactsHandle){
    return `<div class="contacts-file-status prompt">
      <span>💾 ${count} contact${count!==1?'s':''} loaded from this device — OneDrive file not synced this session</span>
      <span style="display:flex;gap:6px;margin-top:5px">
        <button class="btn-primary" style="padding:4px 12px;font-size:11px" onclick="_reconnectContactsFile()">🔄 Sync with OneDrive file</button>
      </span>
    </div>`;
  } else {
    return `<div class="contacts-file-status unlinked">
      <span>💾 ${count} contact${count!==1?'s':''} saved on this device — link a contacts.json to sync across computers</span>
      <span style="display:flex;gap:6px;margin-top:5px">
        <button class="btn-sec" style="padding:4px 10px;font-size:11px" onclick="_linkContactsFile(false)">Link existing contacts.json</button>
        <button class="btn-primary" style="padding:4px 10px;font-size:11px" onclick="_linkContactsFile(true)">Create new contacts.json</button>
      </span>
    </div>`;
  }
}

function _renderContactsModal(mode,editId){
  const existing=document.getElementById('contacts-modal'); if(existing) existing.remove();
  const contacts=loadContacts();
  let bodyHtml='';
  if(mode==='form'){
    const c=editId?(contacts.find(x=>x.id===editId)||{}):{};
    bodyHtml=`
      <div class="contact-form">
        <h4>${editId?'Edit Contact':'New Contact'}</h4>
        <div class="cform-row">
          <div><label>Company Name *</label><input id="cf-company" value="${esc(c.company||'')}" placeholder="Andersen Construction"></div>
          <div><label>Attention / PM</label><input id="cf-attention" value="${esc(c.attention||'')}" placeholder="Project Manager"></div>
        </div>
        <div class="cform-row full">
          <div><label>Address</label><input id="cf-address" value="${esc(c.address||'')}" placeholder="123 Main St, Portland, OR 97201"></div>
        </div>
        <div class="cform-row">
          <div><label>Phone</label><input id="cf-phone" value="${esc(c.phone||'')}" placeholder="(503) 555-1234"></div>
          <div><label>Email</label><input id="cf-email" value="${esc(c.email||'')}" placeholder="pm@contractor.com"></div>
        </div>
      </div>`;
  } else {
    bodyHtml=`
      ${_fileStatusHtml()}
      <input class="contacts-search" id="contact-search-inp" placeholder="Search contacts…" oninput="filterContactsList(this.value)" autocomplete="off">
      <div id="contact-list-body">${_contactListHtml(contacts,'')}</div>`;
  }
  const mo=document.createElement('div');
  mo.className='modal-overlay'; mo.id='contacts-modal';
  mo.innerHTML=`<div class="modal" style="max-width:580px">
    <div class="modal-head">
      <h2>Address Book</h2>
      <button onclick="document.getElementById('contacts-modal').remove()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1">✕</button>
    </div>
    <div class="modal-body">${bodyHtml}</div>
    <div class="modal-foot">
      ${mode==='form'?`
        <button class="btn-sec" onclick="_renderContactsModal('list',null)">Cancel</button>
        <button class="btn-primary" onclick="_saveContactForm('${editId||''}')">Save Contact</button>
      `:`
        <button class="btn-sec" onclick="document.getElementById('contacts-modal').remove()">Close</button>
        <button class="btn-primary" onclick="_renderContactsModal('form',null)">+ New Contact</button>
      `}
    </div>
  </div>`;
  document.body.appendChild(mo);
  if(mode==='list'){ const si=document.getElementById('contact-search-inp'); if(si) setTimeout(()=>si.focus(),50); }
  else { const ci=document.getElementById('cf-company'); if(ci) setTimeout(()=>ci.focus(),50); }
}

function _saveContactForm(editId){
  const company=(document.getElementById('cf-company').value||'').trim();
  if(!company){ alert('Company name is required.'); return; }
  const contacts=loadContacts();
  const rec={
    id:        editId||('c'+Date.now()),
    company,
    attention: (document.getElementById('cf-attention').value||'').trim(),
    address:   (document.getElementById('cf-address').value||'').trim(),
    phone:     (document.getElementById('cf-phone').value||'').trim(),
    email:     (document.getElementById('cf-email').value||'').trim()
  };
  if(editId){ const idx=contacts.findIndex(x=>x.id===editId); if(idx>=0) contacts[idx]=rec; else contacts.push(rec); }
  else contacts.push(rec);
  saveContacts(contacts);
  _renderContactsModal('list',null);
}

function _deleteContact(id){
  if(!confirm('Delete this contact?')) return;
  saveContacts(loadContacts().filter(x=>x.id!==id));
  _renderContactsModal('list',null);
}
</script>
