<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FS Estimator v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:#f0f2f5;color:#222;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* ── TOP BAR ── */
#topbar{background:#1E3A5F;color:#fff;display:flex;align-items:center;padding:0 12px;height:46px;gap:10px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.tb-brand{font-size:15px;font-weight:700;letter-spacing:.5px;color:#7ec8e3;white-space:nowrap}
#project-label{font-size:13px;color:#aac8e0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px}
#tb-actions{display:flex;gap:6px;flex-shrink:0}
.tb-btn{background:#2D6A8F;color:#fff;border:none;border-radius:4px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.tb-btn:hover{background:#3a80aa}
.tb-btn.accent{background:#c8651a}
.tb-btn.accent:hover{background:#e07520}
#tb-bid{display:flex;gap:14px;margin-left:10px;background:rgba(255,255,255,.08);border-radius:6px;padding:5px 12px;flex-shrink:0}
.bid-lbl{font-size:11px;color:#aac8e0}
.bid-val{font-size:13px;font-weight:700;color:#fff}
.bid-total-box{border-left:1px solid rgba(255,255,255,.2);padding-left:14px}
.bid-total-box .bid-val{color:#7ec8e3;font-size:14px}
/* ── MAIN PANELS ── */
#main{display:flex;flex:1;overflow:hidden}
/* ── LEFT PANEL ── */
#panel-left{width:230px;min-width:180px;background:#1a3250;color:#d0dcea;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.tree-top-links{padding:8px 0 4px}
.tree-link{display:block;padding:7px 16px;cursor:pointer;font-size:12px;color:#aac8e0;border-left:3px solid transparent;transition:background .15s}
.tree-link:hover{background:rgba(255,255,255,.06);color:#fff}
.tree-link.active{background:rgba(46,106,143,.5);border-left-color:#7ec8e3;color:#fff;font-weight:600}
.tree-areas-head{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 4px;font-size:10px;font-weight:700;color:#6a90b8;letter-spacing:.8px;text-transform:uppercase;border-top:1px solid rgba(255,255,255,.07);margin-top:4px}
.btn-tree-add{background:#2D6A8F;color:#fff;border:none;border-radius:3px;width:20px;height:20px;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
.btn-tree-add:hover{background:#3a80aa}
.tree-area-wrap{border-bottom:1px solid rgba(255,255,255,.05)}
.tree-area{display:flex;align-items:center;padding:6px 8px 6px 12px;cursor:pointer;gap:5px;transition:background .15s}
.tree-area:hover{background:rgba(255,255,255,.06)}
.tree-area.active{background:rgba(46,106,143,.4)}
.tree-expand{font-size:9px;color:#6a90b8;width:12px;flex-shrink:0}
.tree-area-name{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#d0dcea}
.tree-area.active .tree-area-name{color:#fff;font-weight:600}
.tree-flag{font-size:10px;color:#6a90b8;display:flex;align-items:center;gap:2px;flex-shrink:0;cursor:pointer}
.tree-flag input{margin:0;cursor:pointer}
.btn-tree-del{background:none;border:none;color:#5a7a9a;cursor:pointer;font-size:12px;padding:1px 3px;flex-shrink:0}
.btn-tree-del:hover{color:#e07070}
.tree-sections{padding-left:20px}
.tree-section-item{display:flex;align-items:center;padding:4px 8px 4px 4px;cursor:pointer;gap:4px;border-radius:3px;margin:1px 0}
.tree-section-item:hover{background:rgba(255,255,255,.07)}
.tree-section-item.active{background:rgba(46,106,143,.35)}
.tree-sec-name{flex:1;font-size:11px;color:#aac8e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-section-item.active .tree-sec-name{color:#fff}
.tree-add-sec{padding:4px 8px 4px 24px;cursor:pointer;font-size:11px;color:#5a7a9a;display:block}
.tree-add-sec:hover{color:#7ec8e3}
/* ── CENTER PANEL ── */
#panel-center{flex:1;overflow-y:auto;background:#f5f7fa;display:flex;flex-direction:column}
.view-header{background:#fff;border-bottom:1px solid #dde2ea;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.view-title{font-size:16px;font-weight:700;color:#1E3A5F}
.view-subtitle{font-size:12px;color:#888;margin-top:2px}
/* Info view */
.info-form{padding:20px;max-width:700px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{border:1px solid #cdd3dd;border-radius:4px;padding:7px 10px;font-size:13px;font-family:inherit;color:#222;background:#fff;width:100%}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#2D6A8F;box-shadow:0 0 0 2px rgba(45,106,143,.12)}
.form-group textarea{resize:vertical;min-height:70px}
.di-row{display:flex;gap:16px;align-items:flex-end;margin-bottom:14px;background:#eef3f9;border-radius:6px;padding:12px}
.di-row .form-group{flex:1}
.di-row .form-group input{max-width:90px}
/* Base bid summary view */
.summary-table{width:100%;border-collapse:collapse;margin:20px}
.summary-table th{background:#1E3A5F;color:#fff;padding:8px 14px;text-align:left;font-size:12px;font-weight:600}
.summary-table td{padding:7px 14px;border-bottom:1px solid #e0e5ed;font-size:13px}
.summary-table tr:hover td{background:#f0f5fb}
.summary-table .area-ignored td{color:#aaa;text-decoration:line-through}
.summary-total-row td{font-weight:700;background:#eef3f9;border-top:2px solid #2D6A8F}
.summary-bid-section{margin:20px;background:#fff;border-radius:8px;border:1px solid #dde2ea;padding:18px;max-width:420px}
.summary-bid-section h3{font-size:13px;font-weight:700;color:#1E3A5F;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #eee}
.bid-calc-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #f0f0f0}
.bid-calc-row.total{font-weight:700;font-size:15px;color:#1E3A5F;border-top:2px solid #2D6A8F;border-bottom:none;margin-top:4px;padding-top:8px}
/* Area grid view */
.area-grid-wrap{padding:16px;flex:1}
.grid-table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.grid-table th{background:#1E3A5F;color:#fff;padding:7px 8px;text-align:left;font-size:11px;font-weight:600;white-space:nowrap}
.grid-table th.center{text-align:center}
.grid-table td{padding:3px 5px;border-bottom:1px solid #eee;vertical-align:middle}
.grid-table tr:hover td{background:#f5f8fc}
/* Section header row */
.sec-row{background:#e8eef5 !important}
.sec-row-active{background:#d0e8f8 !important;border-left:3px solid #2D6A8F !important}
.sec-row td{padding:4px 6px !important;border-bottom:2px solid #c8d4e3 !important}
.sec-row:hover td{background:#dce5f0 !important}
.sec-name-inp{border:none;background:transparent;font-size:12px;font-weight:700;color:#1E3A5F;width:100%;padding:2px 4px;font-family:inherit}
.sec-name-inp:focus{outline:1px solid #2D6A8F;border-radius:2px;background:#fff}
.sec-flags{display:flex;gap:8px;align-items:center}
.flag-lbl{font-size:10px;color:#5a7a9a;display:flex;align-items:center;gap:3px;cursor:pointer}
.flag-lbl input{margin:0;cursor:pointer}
.sec-total-cell{font-size:12px;font-weight:700;color:#2D6A8F;text-align:right;white-space:nowrap}
/* Item row inputs */
.item-row td{background:#fff}
.item-row[draggable="true"]:hover td:first-child::before{content:"⠿";color:#ccc;font-size:10px;margin-right:2px}
.item-row.ignored td{background:#fafafa}
.item-row.ignored .desc-inp{color:#aaa;text-decoration:line-through}
.item-row.ignored .item-total{color:#bbb}
.inp{border:1px solid transparent;border-radius:3px;padding:3px 5px;font-size:12px;font-family:inherit;color:#222;background:transparent;width:100%}
.inp:hover{border-color:#cdd3dd;background:#fff}
.inp:focus{outline:none;border-color:#2D6A8F;background:#fff;box-shadow:0 0 0 2px rgba(45,106,143,.1)}
.desc-inp{min-width:180px}
.qty-inp{width:60px;text-align:right}
.unit-inp{width:70px}
.cost-inp{width:80px;text-align:right}
.item-total{text-align:right;font-size:12px;color:#333;white-space:nowrap;padding-right:8px !important}
.item-total.ignored{color:#bbb}
.btn-del-item{background:none;border:none;color:#bbb;cursor:pointer;font-size:12px;padding:2px 4px}
.btn-del-item:hover{color:#e07070}
.add-item-row td{background:#f9fbfc;text-align:center;color:#5a7a9a;cursor:pointer;font-size:11px;padding:5px !important}
.add-item-row:hover td{background:#eef3f9;color:#2D6A8F}
.add-section-row{margin:12px 0 0;text-align:center}
.btn-add-section{background:#eef3f9;border:1px dashed #2D6A8F;color:#2D6A8F;border-radius:5px;padding:7px 20px;cursor:pointer;font-size:12px;font-weight:600;width:100%}
.btn-add-section:hover{background:#dce8f5}
/* ── RIGHT PANEL ── */
#panel-right{width:260px;min-width:200px;background:#fff;border-left:1px solid #dde2ea;display:flex;flex-direction:column;flex-shrink:0}
.lib-head{background:#2D6A8F;color:#fff;padding:10px 12px;font-size:12px;font-weight:700;letter-spacing:.4px;flex-shrink:0}
.lib-target-bar{background:#f0f5fb;border-bottom:1px solid #dde2ea;padding:5px 10px;font-size:10px;color:#5a7a9a;flex-shrink:0}
.lib-target-bar span{font-weight:700;color:#2D6A8F}
.lib-controls{padding:8px;border-bottom:1px solid #eee;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.lib-search-inp{border:1px solid #cdd3dd;border-radius:4px;padding:6px 9px;font-size:12px;width:100%;font-family:inherit}
.lib-search-inp:focus{outline:none;border-color:#2D6A8F}
.lib-cat-sel{border:1px solid #cdd3dd;border-radius:4px;padding:5px 8px;font-size:11px;width:100%;background:#fff;font-family:inherit}
.lib-cat-sel:focus{outline:none;border-color:#2D6A8F}
#lib-list{flex:1;overflow-y:auto}
.lib-item{padding:7px 10px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
.lib-item:hover{background:#eef5fb}
.lib-item-desc{font-size:11px;color:#222;line-height:1.3;margin-bottom:2px}
.lib-item-meta{font-size:10px;color:#888}
.lib-item-meta strong{color:#2D6A8F}
.lib-empty{padding:20px;text-align:center;color:#aaa;font-size:12px}
/* ZZTakeoff import modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:8px;max-width:800px;width:90%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal-head{background:#1E3A5F;color:#fff;padding:14px 18px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-head h2{font-size:14px;font-weight:700}
.modal-body{flex:1;overflow-y:auto;padding:16px}
.modal-foot{padding:12px 16px;border-top:1px solid #eee;display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.match-table{width:100%;border-collapse:collapse;font-size:11px}
.match-table th{background:#f0f2f5;padding:6px 8px;text-align:left;border-bottom:1px solid #dde2ea;font-weight:600;color:#555}
.match-table td{padding:5px 8px;border-bottom:1px solid #eef0f3;vertical-align:top}
.match-table tr:hover td{background:#f8f9fb}
.conf-high{color:#2a7a2a;font-weight:700}
.conf-med{color:#b07a00;font-weight:600}
.conf-low{color:#a03030}
.btn-primary{background:#2D6A8F;color:#fff;border:none;border-radius:4px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary:hover{background:#1E3A5F}
.btn-sec{background:#f0f2f5;color:#444;border:1px solid #ccc;border-radius:4px;padding:8px 16px;cursor:pointer;font-size:13px}
.btn-sec:hover{background:#e0e5ea}
.btn-danger{background:#c83030;color:#fff;border:none;border-radius:4px;padding:8px 16px;cursor:pointer;font-size:13px}
.btn-danger:hover{background:#a02020}
/* Address Book */
.client-dd{position:fixed;background:#fff;border:1px solid #cdd3dd;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:2000;min-width:280px;max-height:220px;overflow-y:auto;display:none}
.client-dd-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.client-dd-item:hover{background:#eef3f9}
.client-dd-item:last-child{border-bottom:none}
.client-dd-company{font-size:13px;font-weight:600;color:#1E3A5F}
.client-dd-attn{font-size:11px;color:#777;margin-top:1px}
.contact-card{background:#f8fafc;border:1px solid #dde2ea;border-radius:6px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start}
.contact-card-info{flex:1}
.contact-card-company{font-size:13px;font-weight:700;color:#1E3A5F}
.contact-card-detail{font-size:11px;color:#666;margin-top:3px;line-height:1.5}
.contact-card-actions{display:flex;gap:6px;flex-shrink:0;margin-left:10px}
.contacts-search{border:1px solid #cdd3dd;border-radius:4px;padding:8px 10px;font-size:13px;width:100%;margin-bottom:12px;font-family:inherit}
.contacts-search:focus{outline:none;border-color:#2D6A8F}
.contact-form{background:#f0f5fb;border-radius:6px;padding:16px;margin-bottom:12px}
.contact-form h4{font-size:13px;font-weight:700;color:#1E3A5F;margin-bottom:12px}
.cform-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.cform-row.full{grid-template-columns:1fr}
.cform-row label{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
.cform-row input{border:1px solid #cdd3dd;border-radius:4px;padding:7px 10px;font-size:13px;font-family:inherit;width:100%}
.cform-row input:focus{outline:none;border-color:#2D6A8F;box-shadow:0 0 0 2px rgba(45,106,143,.12)}
.contacts-file-status{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:5px;font-size:11px;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.contacts-file-status.linked{background:#e8f5e9;color:#2a6a2a;border:1px solid #b8ddb8}
.contacts-file-status.prompt{background:#fff8e1;color:#8a6000;border:1px solid #f0d080;cursor:pointer}
.contacts-file-status.unlinked{background:#fef0e0;color:#7a4010;border:1px solid #f0c090}
/* Misc */

/* ── Alternates / Terms sidebar ── */
.tree-alt-item{display:flex;align-items:center;padding:5px 8px 5px 16px;cursor:pointer;gap:4px;border-bottom:1px solid rgba(255,255,255,.04)}
.tree-alt-item:hover{background:rgba(255,255,255,.06)}
.tree-alt-item.active{background:rgba(46,106,143,.35)}
.tree-alt-num{font-size:10px;color:#6a90b8;min-width:18px;flex-shrink:0}
.tree-alt-name{flex:1;font-size:11px;color:#aac8e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-alt-item.active .tree-alt-name{color:#fff}
.tree-terms-link{display:flex;align-items:center;padding:6px 16px;cursor:pointer;font-size:12px;color:#aac8e0;border-left:3px solid transparent;gap:6px;transition:background .15s}
.tree-terms-link:hover{background:rgba(255,255,255,.06);color:#fff}
.tree-terms-link.active{background:rgba(46,106,143,.5);border-left-color:#7ec8e3;color:#fff;font-weight:600}
.tree-terms-badge{background:rgba(255,255,255,.12);border-radius:8px;font-size:9px;padding:1px 5px;color:#aac8e0;margin-left:auto}
/* ── Exclusions / Clarifications center view ── */
.excl-view{padding:16px;flex:1;overflow-y:auto}
.excl-section{background:#fff;border:1px solid #dde2ea;border-radius:6px;padding:14px;margin-bottom:14px}
.excl-section-title{font-size:12px;font-weight:700;color:#1E3A5F;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.excl-item{display:flex;align-items:flex-start;gap:8px;padding:5px 4px;border-radius:3px;border:1px solid transparent}
.excl-item:hover{background:#f5f8fc;border-color:#e0e8f2}
.excl-item.sub{padding-left:22px}
.excl-item.inactive .excl-text{color:#bbb;text-decoration:line-through}
.excl-item input[type=checkbox]{margin-top:3px;cursor:pointer;flex-shrink:0}
.excl-text{flex:1;font-size:12px;line-height:1.5;color:#333;cursor:text;outline:none;border:none;background:transparent;font-family:inherit;resize:none;padding:0}
.excl-text:focus{background:#fffbe8;border-radius:2px;padding:1px 3px}
.btn-excl-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:12px;padding:2px 4px;flex-shrink:0;margin-top:1px}
.btn-excl-del:hover{color:#e07070}
.excl-add-row{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed #dde2ea}
.excl-add-inp{flex:1;border:1px solid #cdd3dd;border-radius:4px;padding:6px 10px;font-size:12px;font-family:inherit}
.excl-add-inp:focus{outline:none;border-color:#2D6A8F}
/* ── Alternates center view ── */
.alts-view{padding:16px;flex:1;overflow-y:auto}


/* ── Ingestion tools ── */
.ingest-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:4px;font-size:12px;cursor:pointer;border:1px dashed #3a6a8a;background:rgba(255,255,255,.05);color:#aac8e0;width:calc(100% - 16px);margin:4px 8px;transition:background .15s}
.ingest-btn:hover{background:rgba(46,106,143,.3);color:#fff}
.ingest-btn.has-data{border-style:solid;border-color:#2D6A8F;color:#7ec8e3}
.ingest-section-head{padding:6px 12px 4px;font-size:10px;font-weight:700;color:#6a90b8;letter-spacing:.8px;text-transform:uppercase;border-top:1px solid rgba(255,255,255,.07);margin-top:4px;display:flex;align-items:center;justify-content:space-between}
/* Finish schedule view */
.fs-table{width:100%;border-collapse:collapse;font-size:11px}
.fs-table th{background:#1E3A5F;color:#fff;padding:5px 8px;text-align:left;white-space:nowrap;position:sticky;top:0}
.fs-table td{padding:4px 8px;border-bottom:1px solid #eef0f3;vertical-align:top}
.fs-table tr:hover td{background:#f0f5fb}
.finish-code{display:inline-block;background:#e8f0fb;border:1px solid #b8d0f0;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:600;color:#1E3A5F;white-space:nowrap}
.finish-legend-card{background:#fff;border:1px solid #dde2ea;border-radius:5px;padding:10px 12px;margin-bottom:6px;display:flex;gap:12px;align-items:flex-start}
.finish-legend-code{min-width:52px;text-align:center}
.finish-legend-info{flex:1}
.finish-legend-desc{font-size:12px;font-weight:600;color:#222}
.finish-legend-meta{font-size:11px;color:#666;margin-top:2px}
/* Spec findings */
.finding-card{background:#fff;border:1px solid #dde2ea;border-radius:5px;padding:10px 14px;margin-bottom:8px}
.finding-card.accepted{border-color:#2a7a2a;background:#f0faf0}
.finding-card.dismissed{opacity:.45}
.finding-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:6px}
.ft-hardware{background:#e8f0fb;color:#1E3A5F}
.ft-material{background:#f0e8fb;color:#4a1a7a}
.ft-awi_grade{background:#fdf0e0;color:#7a4010}
.ft-submittal{background:#e0f0e8;color:#1a5a2a}
.ft-scope_risk{background:#fde8e8;color:#8a1a1a}
.ft-clarification{background:#e8f8e0;color:#2a5a10}
.finding-text{font-size:12px;color:#333;line-height:1.5;margin-bottom:8px}
.finding-suggestion{font-size:11px;color:#555;font-style:italic;margin-bottom:8px;padding:6px 8px;background:#f8f9fb;border-radius:3px;border-left:2px solid #2D6A8F}
.finding-actions{display:flex;gap:6px}
.severity-flag{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600}
.sev-warning{background:#fde8e8;color:#8a1a1a}
.sev-flag{background:#fdf0e0;color:#7a4010}
.sev-note{background:#f0f2f5;color:#555}
/* Loading overlay */
.ingest-loading{position:fixed;inset:0;background:rgba(10,25,50,.7);z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.ingest-loading-box{background:#fff;border-radius:8px;padding:30px 40px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.ingest-spinner{width:36px;height:36px;border:4px solid #e0e8f4;border-top:4px solid #2D6A8F;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{text-align:center;padding:60px 20px;color:#aaa}
.empty-state h3{font-size:16px;margin-bottom:8px;color:#888}
.ph{color:#bbb;font-style:italic}
</style>

<!-- TOP BAR -->
<div id="topbar">
  <span class="tb-brand">FS Estimator v2</span>
  <span id="project-label">New Project</span>
  <div id="tb-actions">
    <button class="tb-btn" onclick="newProject()">New</button>
    <button class="tb-btn" onclick="openProject()">Open</button>
    <button class="tb-btn" onclick="saveProject()">Save</button>
    <button class="tb-btn" onclick="saveProjectAs()">Save As</button>

  </div>
  <span id="autosave-lbl" style="font-size:10px;color:#7ec8e3;opacity:0;transition:opacity 1s;flex-shrink:0;padding:0 6px">Autosaved</span>

  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="panel-left"></div>
  <div id="panel-center"></div>
  <div id="panel-right">
    <div class="lib-head" style="display:flex;align-items:center;justify-content:space-between">PRICING LIBRARY<button class="tb-btn" style="padding:3px 8px;font-size:10px;background:rgba(255,255,255,.15)" onclick="openLibEditor()">Edit</button></div>
    <div class="lib-target-bar">Adding to: <span id="lib-target-name">— select a section —</span></div>
    <div class="lib-controls">
      <input id="lib-search" class="lib-search-inp" type="text" placeholder="Search items…" oninput="filterLib()">
      <select id="lib-cat" class="lib-cat-sel" onchange="filterLib()">
        <option value="">All Categories</option>
      </select>
    </div>
    <div id="lib-list"></div>
  </div>
</div>

const _undoStack = [];
const MAX_UNDO = 40;

function pushUndo(){
  _undoStack.push(JSON.stringify(ST));
  if(_undoStack.length > MAX_UNDO) _undoStack.shift();
  updateUndoBtn();
}

function undo(){
  if(!_undoStack.length) return;
  ST = JSON.parse(_undoStack.pop());
  _dirty = true;
  render(); updateTitle(); updateUndoBtn();
}

function updateUndoBtn(){
  const btn = document.getElementById('btn-undo');
  if(btn){ btn.disabled = _undoStack.length === 0; btn.style.opacity = _undoStack.length ? '1' : '0.4'; }
}

function defaultState(){
  return {
    info: {
      id:'', name:'', client:'', address:'', bidDate:'', scope:'',
      architect:'', gc:'', attention:'', shipVia:'Truck', terms:'Net 30',
      deliveryDate:'', estimator:'Evan Ramsey', poNumber:'',
      bidDocs:'', drawingsDated:'', specsDated:'', addendums:'',
      docType:'Proposal'
    },
    areas: [],
    ohPct: 15, delPct: 5, insPct: 20,
    pricingMode: 'byarea',   // lumpsum | byarea | itemized
    subItems: [],            // [{desc, cost, markupPct}] supplier/sub items
    altItems: [],            // [{desc, qty, unit, price}] alternates
    exclusions: EXCLUSIONS.map(t=>({text:t,active:true,sub:t.startsWith('  ')})),
    clarifications: CLARIFICATIONS.map(t=>({text:t,active:true,sub:false})),
    generalTerms: GENERAL_TERMS.map(t=>({text:t,active:true,sub:t.startsWith('  ')})),
    warranty:     WARRANTY.map(t=>({text:t,active:true,sub:t.startsWith('  ')})),
    finishTerms:  FINISH.map(t=>({text:t,active:true,sub:t.startsWith('  ')})),
    hardwareTerms:HARDWARE.map(t=>({text:t,active:true,sub:t.startsWith('  ')})),
    fabNote:      FAB_NOTE.map(t=>({text:t,active:true,sub:t.startsWith('  ')})),
    sel: { view:'info', areaId:null, sectionId:null, altIdx:null },
    finishSchedule: null,
    specFindings: [],
    _uid: 1
  };
}
let ST = defaultState();
let _fileHandle = null;
let _dirty = false;

function uid(){ return ST._uid++; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt$(n){ return '$' + (+(n||0)).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function pct(v){ return parseFloat(v)||0; }

// ── Finders ──────────────────────────────────────────────────
function findArea(id){ return ST.areas.find(a=>a.id===id)||null; }
function findSection(id){ for(const a of ST.areas) for(const s of a.sections) if(s.id===id) return s; return null; }
function findItem(id){ for(const a of ST.areas) for(const s of a.sections) for(const i of s.items) if(i.id===id) return i; return null; }
function sectionParent(sId){ return ST.areas.find(a=>a.sections.some(s=>s.id===sId))||null; }
function itemParent(iId){ for(const a of ST.areas) for(const s of a.sections) if(s.items.some(i=>i.id===iId)) return s; return null; }

// ── Cost calc ─────────────────────────────────────────────────
function itemTotal(it){ return it.ignore ? 0 : (pct(it.qty))*(pct(it.unitCost)); }
function sectionTotal(sec){ return sec.ignore ? 0 : sec.items.reduce((s,i)=>s+itemTotal(i),0); }
function areaTotal(area){ return area.ignore ? 0 : (area.qty||1) * area.sections.reduce((s,sec)=>s+sectionTotal(sec),0); }
function matTotal(){ return ST.areas.reduce((s,a)=>s+areaTotal(a),0); }

function calcBid(){
  const mat = matTotal();
  const ohAmt = mat * (pct(ST.ohPct)/100);
  const matOh = mat + ohAmt;
  const delAmt = matOh * (pct(ST.delPct)/100);
  const insAmt = matOh * (pct(ST.insPct)/100);
  const total = matOh + delAmt + insAmt;
  return { mat, ohAmt, matOh, delAmt, insAmt, total };
}

function markDirty(){ _dirty = true; }

// ── Grid keyboard navigation ─────────────────────────────────────────────
function _gridKeydown(e, itemId, field, secId){
  if(e.key==='Enter' || (e.key==='Tab' && !e.shiftKey && field==='unitCost')){
    e.preventDefault();
    // find next item or add new one
    const sec = findSection(secId);
    if(!sec) return;
    const idx = sec.items.findIndex(i=>i.id===itemId);
    if(idx >= 0 && idx < sec.items.length-1){
      // focus next row desc
      setTimeout(()=>{
        const next = document.querySelector(`[data-item="${sec.items[idx+1].id}"][data-field="desc"]`);
        if(next) next.focus();
      }, 0);
    } else if(e.key==='Enter'){

}

// ── PROPOSAL TERMS (General Terms, Warranty, Finish, Hardware, Fab Note) ─
const TERM_SECTIONS = [
  { key:'generalTerms',  label:'General Terms',          reset: ()=>GENERAL_TERMS },
  { key:'warranty',      label:'Warranty & Fabrication',  reset: ()=>WARRANTY },
  { key:'finishTerms',   label:'Finish Materials',        reset: ()=>FINISH },
  { key:'hardwareTerms', label:'Hardware Assumptions',    reset: ()=>HARDWARE },
  { key:'fabNote',       label:'Fabrication Note',        reset: ()=>FAB_NOTE },
];
function toggleTerm(key,i,v){ if(ST[key]&&ST[key][i]) ST[key][i].active=v; markDirty(); renderProposalTermsView(); }
function editTerm(key,i,v){ if(ST[key]&&ST[key][i]) ST[key][i].text=v; markDirty(); }
function deleteTerm(key,i){ pushUndo(); ST[key].splice(i,1); markDirty(); renderProposalTermsView(); }
function addTerm(key){
  const inp=document.getElementById('term-add-'+key);
  const text=(inp?.value||'').trim(); if(!text) return;
  pushUndo();
  ST[key].push({text,active:true,sub:false});
  inp.value=''; markDirty(); renderProposalTermsView();
}
function resetTerm(key){
  const sec=TERM_SECTIONS.find(s=>s.key===key); if(!sec) return;
  if(!confirm('Reset "'+sec.label+'" to defaults?')) return;
  pushUndo();
  ST[key]=sec.reset().map(t=>({text:t,active:true,sub:t.startsWith('  ')}));
  markDirty(); renderProposalTermsView();
}
function toggleAllTerms(key,v){ (ST[key]||[]).forEach(e=>e.active=v); markDirty(); renderProposalTermsView(); }

function renderProposalTermsView(){
  let sectionsHtml='';
  for(const sec of TERM_SECTIONS){
    const items=ST[sec.key]||[];
    const activeCount=items.filter(e=>e.active).length;
    const rows=items.map((it,i)=>`
      <div class="excl-item${it.sub?' sub':''}${it.active?'':' inactive'}">
        <input type="checkbox" ${it.active?'checked':''} onchange="toggleTerm('${sec.key}',${i},this.checked)" title="Include in proposal">
        <textarea class="excl-text" rows="1" oninput="editTerm('${sec.key}',${i},this.value);autoResizeTA(this)"
          style="min-height:22px">${esc(it.text)}</textarea>
        <button class="btn-excl-del" onclick="deleteTerm('${sec.key}',${i})" title="Remove">✕</button>
      </div>`).join('');
    sectionsHtml+=`
      <div class="excl-section" style="margin-bottom:18px">
        <div class="excl-section-title" style="display:flex;justify-content:space-between;align-items:center">
          <span>${sec.label} <span style="font-weight:400;font-size:10px;color:#888">${activeCount}/${items.length} active</span></span>
          <span style="display:flex;gap:4px">
            <button class="tb-btn" style="font-size:10px;padding:2px 7px" onclick="toggleAllTerms('${sec.key}',true)">All On</button>
            <button class="tb-btn" style="font-size:10px;padding:2px 7px" onclick="toggleAllTerms('${sec.key}',false)">All Off</button>
            <button class="tb-btn" style="font-size:10px;padding:2px 7px" onclick="resetTerm('${sec.key}')">Reset</button>
          </span>
        </div>
        ${rows}
        <div class="excl-add-row">
          <input class="excl-add-inp" id="term-add-${sec.key}" placeholder="Add item…"
            onkeydown="if(event.key==='Enter'){addTerm('${sec.key}');event.preventDefault()}">
          <button class="btn-primary" style="padding:4px 12px;font-size:12px" onclick="addTerm('${sec.key}')">+ Add</button>
        </div>
      </div>`;
  }
  document.getElementById('panel-center').innerHTML=`
    <div class="view-header">
      <div><div class="view-title">Proposal Terms</div>
        <div class="view-subtitle">Toggle or edit each section — checked items print in the proposal</div></div>
    </div>
    <div class="excl-view">${sectionsHtml}</div>`;
  setTimeout(()=>document.querySelectorAll('.excl-text').forEach(ta=>autoResizeTA(ta)),10);
}

function autoResizeTA(ta){ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; }

function toggleExcl(key,i,v){ if(ST[key]&&ST[key][i]) ST[key][i].active=v; markDirty(); renderLeft(); updateTitle(); }
function editExcl(key,i,v){ if(ST[key]&&ST[key][i]) ST[key][i].text=v; markDirty(); }
function deleteExcl(key,i){
  pushUndo();
  ST[key].splice(i,1);
  markDirty();
  if(key==='exclusions') renderExclusionsView(); else renderClarificationsView();
  renderLeft();
}
function toggleAllExcl(key,v){ (ST[key]||[]).forEach(e=>e.active=v); markDirty(); renderLeft(); if(key==='exclusions') renderExclusionsView(); else renderClarificationsView(); }
function resetExcl(key){
  if(!confirm('Reset to defaults? Custom items will be lost.')) return;
  pushUndo();
  const def = defaultState();
  ST[key] = def[key];
  markDirty();
  if(key==='exclusions') renderExclusionsView(); else renderClarificationsView();
  renderLeft();
}
function addExcl(key){
  const inp = document.getElementById('excl-new-'+key);
  const subCb = document.getElementById('excl-sub-'+key);
  const text = (inp.value||'').trim();
  if(!text) return;
  pushUndo();
  ST[key].push({text: subCb.checked ? '  '+text : text, active:true, sub:subCb.checked});
  inp.value=''; if(subCb) subCb.checked=false;
  markDirty();
  if(key==='exclusions') renderExclusionsView(); else renderClarificationsView();
  renderLeft();
}

function triggerIngestFS(){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.pdf,application/pdf';
  inp.onchange = async e => {
    const file = e.target.files[0]; if(!file) return;
    showIngestLoading('Reading finish schedule…', 'Extracting rooms and finish codes…');
    try{
      const b64 = await fileToBase64(file);
      const result = await callClaudeWithPDF(b64, FINISH_SCHEDULE_PROMPT);
      const data = parseJsonResponse(result);
      if(!data||!data.finishes){ throw new Error('Could not parse finish schedule data.'); }
      pushUndo();
      ST.finishSchedule = {
        source: file.name,
        project: data.project||'',
        sheetNum: data.sheetNum||'',
        ingestedAt: new Date().toLocaleDateString(),
        printOnProposal: false,
        printOnWorksheet: true,
        rooms: data.rooms||[],
        finishes: data.finishes||[]
      };
      markDirty();
      hideIngestLoading();
      setView('finish-schedule');
    } catch(e){
      hideIngestLoading();
      alert('Finish schedule ingestion failed: ' + e.message);
    }
  };
  inp.click();
}

function triggerIngestSpec(){

}

// SPEC FINDINGS CENTER VIEW
// ══════════════════════════════════════════════════════════════
function renderSpecFindingsView(){
  const findings = ST.specFindings||[];
  if(!findings.length){
    document.getElementById('panel-center').innerHTML='<div class="empty-state"><h3>No spec findings</h3><p>Click "Ingest Spec Section" in the sidebar</p></div>';
    return;
  }

  const typeOrder = ['scope_risk','awi_grade','hardware','material','submittal','clarification'];
  const typeLabels = {scope_risk:'Scope Risk',awi_grade:'AWI Grade',hardware:'Hardware',material:'Material',submittal:'Submittal',clarification:'Clarification'};
  const active = findings.filter(f=>!f.dismissed);
  const accepted = active.filter(f=>f.accepted).length;

  let html = '';
  typeOrder.forEach(type=>{
    const group = active.filter(f=>f.type===type);
    if(!group.length) return;
    html += `<div style="font-size:11px;font-weight:700;color:#1E3A5F;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px">${typeLabels[type]||type} (${group.length})</div>`;
    group.forEach((f,i)=>{
      const idx = findings.indexOf(f);
      html += `
        <div class="finding-card${f.accepted?' accepted':''}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span class="finding-type ft-${f.type}">${typeLabels[f.type]||f.type}</span>
            <span class="severity-flag sev-${f.severity||'note'}">${f.severity||'note'}</span>
            ${f.accepted?'<span style="font-size:10px;color:#2a7a2a;font-weight:600;margin-left:auto">✓ Accepted</span>':''}
          </div>
          <div class="finding-text">${esc(f.text)}</div>
          ${f.suggested_action?`<div class="finding-suggestion">💡 ${esc(f.suggested_action)}</div>`:''}
          ${f.suggested_text?`<div style="font-size:11px;background:#f0f5fb;border-radius:3px;padding:6px 8px;margin-bottom:8px;border-left:2px solid #7ec8e3"><em>Suggested text:</em> "${esc(f.suggested_text)}"</div>`:''}
          <div class="finding-actions">
            ${!f.accepted?`<button class="btn-primary" style="padding:4px 10px;font-size:11px" onclick="acceptFinding(${idx})">✓ Accept</button>`:''}
            ${f.accepted&&f.type==='clarification'?`<button class="btn-primary" style="padding:4px 10px;font-size:11px" onclick="acceptFindingToClarification(${idx})">→ Add to Clarifications</button>`:''}
            <button class="btn-sec" style="padding:4px 10px;font-size:11px" onclick="dismissFinding(${idx})">${f.accepted?'Undo':'Dismiss'}</button>
          </div>
        </div>`;
    });
  });

  document.getElementById('panel-center').innerHTML = `
    <div class="view-header">
      <div>
        <div class="view-title">Spec Findings</div>
        <div class="view-subtitle">${active.length} findings · ${accepted} accepted · ${findings.length-active.length} dismissed</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-sec" style="padding:5px 10px;font-size:11px" onclick="acceptAllFindings()">Accept All</button>
        <button class="tb-btn" onclick="triggerIngestSpec()">+ Add Spec</button>
        <button class="btn-danger" style="padding:5px 10px;font-size:11px" onclick="if(confirm('Clear all spec findings?')){pushUndo();ST.specFindings=[];markDirty();render();}">Clear All</button>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px">${html}</div>`;
}

function acceptFinding(idx){
  if(ST.specFindings[idx]) ST.specFindings[idx].accepted=true;
  markDirty(); renderSpecFindingsView(); renderLeft();
}
function dismissFinding(idx){
  if(!ST.specFindings[idx]) return;
  if(ST.specFindings[idx].accepted) ST.specFindings[idx].accepted=false;
  else ST.specFindings[idx].dismissed=true;
  markDirty(); renderSpecFindingsView(); renderLeft();
}
function acceptAllFindings(){
  (ST.specFindings||[]).filter(f=>!f.dismissed).forEach(f=>f.accepted=true);
  markDirty(); renderSpecFindingsView(); renderLeft();
}
function acceptFindingToClarification(idx){
  const f = ST.specFindings[idx]; if(!f) return;
  const text = f.suggested_text || f.text;
  pushUndo();
  ST.clarifications.push({text, active:true, sub:false});
  f.accepted=true;
  markDirty(); renderSpecFindingsView(); renderLeft();
}

    doc.setFont('helvetica',opts.bold&&opts.italic?'bolditalic':opts.bold?'bold':opts.italic?'italic':'normal');
    doc.setTextColor(...(opts.color||[0,0,0]));
    if(opts.align==='right') doc.text(String(str),x,yy,{align:'right'});
    else doc.text(String(str),x,yy,{maxWidth:opts.maxWidth||undefined});
  }
  function hline(yy,lw){ doc.setDrawColor(153); doc.setLineWidth(lw||0.3); doc.line(LM,yy,RM,yy); }

  doc.addPage();
  txt(LM,y,'Form and Structure, Inc.  Finish Schedule Reference',{bold:true,size:9.5}); y+=4.5;
  txt(LM,y,(I.id?I.id+' - ':'')+I.name+'    Date '+I.bidDate,{size:8.5});
  txt(RM,y,'Sheet: '+fs.sheetNum,{size:8.5,align:'right'}); y+=4.5;
  txt(LM,y,I.client,{size:8.5}); y+=3.5;
  hline(y,0.5); y+=5;

  txt(LM,y,'FINISH LEGEND',{bold:true,size:9}); y+=5;

  // Two-column legend
  const col1x=LM, col2x=LM+CW/2;
  const fins = fs.finishes||[];
  for(let i=0;i<fins.length;i++){
    const f=fins[i];
    const x=i%2===0?col1x:col2x;
    if(i%2===0&&i>0) y+=4.5;
    txt(x,y,f.code,{bold:true,size:7.5,color:[30,58,95]});
    txt(x+16,y,`${f.type||''}${f.color?' — '+f.color:''}`,{size:7.5});
    const meta=[f.manufacturer,f.series].filter(Boolean).join(' / ');
    if(meta){ txt(x+16,y+3,meta,{size:6.5,color:[100,100,100]}); }
  }
  y+=(fins.length%2===0?4.5:9)+4;
  hline(y,0.3); y+=5;

  // Room table header
  if(fs.rooms&&fs.rooms.length){
    txt(LM,y,'ROOM FINISH SCHEDULE',{bold:true,size:9}); y+=5;
    const roomKeys=Object.keys(fs.rooms[0]).filter(k=>k!=='notes');
    const colW = CW/Math.min(roomKeys.length,8);
    doc.setFillColor(30,58,95);
    doc.rect(LM,y-3.5,CW,5,'F');
    let cx=LM;
    roomKeys.slice(0,8).forEach(k=>{
      txt(cx,y,k.charAt(0).toUpperCase()+k.slice(1),{bold:true,size:7,color:[255,255,255]});
      cx+=colW;
    });
    y+=3.5;

    fs.rooms.forEach(r=>{
      if(y>275){ doc.addPage(); y=20; }
      hline(y-0.5,0.2);
      cx=LM;
      roomKeys.slice(0,8).forEach(k=>{ txt(cx,y+2.5,String(r[k]||''),{size:6.5}); cx+=colW; });
      y+=5;
    });
  }
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=()=>reject(new Error('File read failed'));
    reader.readAsDataURL(file);
  });
}

async function callClaudeWithPDF(base64Data, promptText){
  const response = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 4096,
      messages:[{
        role:'user',
        content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:base64Data}},
          {type:'text',text:promptText}
        ]
      }]
    })
  });
  if(!response.ok){ const e=await response.text(); throw new Error('API error: '+e); }
  const data=await response.json();
  const textBlock=data.content.find(b=>b.type==='text');
  if(!textBlock) throw new Error('No text response from API');
  return textBlock.text;
}

function parseJsonResponse(text){
  // Strip any markdown fences
  const clean = text.replace(/```json|```/g,'').trim();
  try{ return JSON.parse(clean); }
  catch(e){
    // Try to extract JSON object from response
    const match = clean.match(/\{[\s\S]*\}/);
    if(match) return JSON.parse(match[0]);
    throw new Error('Could not parse JSON response');
  }
}

function projectToJSON(){
  const save = JSON.parse(JSON.stringify(ST));
  delete save._uid; save._uid = ST._uid;
  return JSON.stringify(save, null, 2);
}

function loadFromJSON(text){
  const data = JSON.parse(text);
  // Back-compat: fill any fields added after the file was saved
  const def = defaultState();
  data.info = Object.assign({}, def.info, data.info||{});
  if(data.subItems===undefined) data.subItems=[];
  if(data.altItems===undefined) data.altItems=[];
  if(!data.pricingMode) data.pricingMode='byarea';
  if(!data.exclusions) data.exclusions=def.exclusions;
  else if(typeof data.exclusions==='string')
    data.exclusions=data.exclusions.split('\n').filter(l=>l.trim()).map(t=>({text:t,active:true,sub:t.startsWith('  ')}));
  if(!data.clarifications) data.clarifications=def.clarifications;
  else if(typeof data.clarifications==='string')
    data.clarifications=data.clarifications.split('\n').filter(l=>l.trim()).map(t=>({text:t,active:true,sub:false}));
  // back-compat: proposal terms sections (added later)
  if(!data.generalTerms)   data.generalTerms   = def.generalTerms;
  if(!data.warranty)       data.warranty       = def.warranty;
  if(!data.finishTerms)    data.finishTerms    = def.finishTerms;
  if(!data.hardwareTerms)  data.hardwareTerms  = def.hardwareTerms;
  if(!data.fabNote)        data.fabNote        = def.fabNote;
  // migrate old alts/excls/clarifs string fields
  if(data.alts&&!data.altItems.length){ /* old format, ignore */ }
  ST = data;
  _dirty = false;
  render();
  updateTitle();
}

function wordTokens(s){ return (s||'').toLowerCase().split(/\W+/).filter(w=>w.length>=3); }

function matchScore(zzDesc, libDesc){
  const zzW = new Set(wordTokens(zzDesc));
  const liW = wordTokens(libDesc);
  if(!zzW.size) return 0;
  const hits = liW.filter(w=>zzW.has(w)).length;
  return hits / Math.max(zzW.size, liW.length);
}

function bestMatch(desc){
  let best=null, bestScore=0;
  for(const it of PRICE_LIB){
    const s = matchScore(desc, it.desc);
    if(s>bestScore){ bestScore=s; best=it; }
  }
  return { item:best, score:bestScore };
}

async function importZZTakeoff(){
  try{
    const [fh] = await window.showOpenFilePicker({ types:[{description:'Excel Workbook',accept:{'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':['.xlsx','.xls']}}] });
    const file = await fh.getFile();
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

    // ── Detect ZZTakeoff header row ──────────────────────────
    // Supports two ZZTakeoff export formats:
    //   A) Priced:   Name | Measurement 1 | Units 1 | Qty | Units | ... | Cost Each | Cost Total
    //   B) Measured: Group | Measurement 1 | Units 1 | ... (no Qty, Units, or Cost Each columns)
    let headerRow=-1, cols={}, formatB=false;
    for(let r=0;r<Math.min(rows.length,5);r++){
      const row=rows[r];
      const rLow=row.map(c=>String(c).toLowerCase().trim());
      const ni=rLow.findIndex(c=>c==='name'||c==='group');
      const hasM1=rLow.some(c=>/measurement.?1/.test(c));
      if(ni>=0 && hasM1){
        headerRow=r;
        const costIdx=rLow.findIndex(c=>/cost.?each/.test(c));
        formatB = costIdx<0;
        cols={
          name:  ni,
          meas1: rLow.findIndex(c=>/measurement.?1/.test(c)),
          units1:rLow.findIndex(c=>/units.?1/.test(c)),
          qty:   rLow.findIndex(c=>/^qty$/.test(c)),
          units: rLow.findIndex(c=>/^units$/.test(c)),
          costEach: costIdx
        };
        break;
      }
    }

    // ── Fallback: generic header detection ───────────────────
    if(headerRow<0){
      for(let r=0;r<Math.min(rows.length,10);r++){
        const row=rows[r].map(c=>String(c).toLowerCase().trim());
        const qi=row.findIndex(c=>c.includes('qty')||c.includes('quantity'));
        const di=row.findIndex(c=>c==='name'||c==='group'||c.includes('desc')||c.includes('item'));
        if(di>=0){
          const costIdx=row.findIndex(c=>c.includes('cost')&&c.includes('each'));
          headerRow=r; formatB=qi<0&&costIdx<0;
          cols={name:di,qty:qi,units:row.findIndex(c=>c==='units'||c==='unit'),
                costEach:costIdx,
                meas1:row.findIndex(c=>/measurement.?1/.test(c)),
                units1:row.findIndex(c=>/units.?1/.test(c))};
          break;
        }
      }
    }
    if(headerRow<0){ alert('Could not find a ZZTakeoff header row in this spreadsheet.'); return; }

    // ── Parse rows into areas + items ────────────────────────
    // ── Parse rows into areas + items ────────────────────────
    // Format A (priced):   area rows have no Cost Each; items have Cost Each
    // Format B (measured): area rows have no Units 1; items have Units 1
    const areas=[];
    let curArea=null;

    for(let r=headerRow+1;r<rows.length;r++){
      const row=rows[r];
      const name=String(row[cols.name]||'').trim(); if(!name) continue;

      if(formatB){
        // ── Measurement-only export (Group / Measurement 1 / Units 1) ──
        const units1=cols.units1>=0?String(row[cols.units1]||'').trim():'';
        const qty   =cols.meas1>=0?parseFloat(row[cols.meas1])||0:0;
        if(!units1){
          curArea={name, items:[], include:true};
          areas.push(curArea);
        } else if(curArea){
          curArea.items.push({desc:name, qty, unit:units1, unitCost:0, include:true});
        }
      } else {
        // ── Priced export (Name / Qty / Units / Cost Each) ──
        const costEach=cols.costEach>=0?row[cols.costEach]:null;
        const hasCost = costEach!=='' && costEach!==null && costEach!==undefined && costEach!==0;
        const units1=cols.units1>=0?String(row[cols.units1]||'').trim():'';
        const units =cols.units >=0?String(row[cols.units ]||'').trim():'';
        const meas1 =cols.meas1>=0?row[cols.meas1]:null;
        const qty   =parseFloat(row[cols.qty])||0;
        const cost  =parseFloat(costEach)||0;

        if(!hasCost){
          curArea={name, items:[], include:true};
          areas.push(curArea);
        } else if(curArea){
          const isProper  = (!meas1 || meas1==='') && units!=='';
          const isSimple  = units1!=='' && units!=='' && units1===units;
          const isPrimary = units1!=='' && units==='';
          if(isPrimary) continue;
          if(isProper||isSimple){
            const unit=isProper?units:units1;
            const q=isProper?qty:(parseFloat(meas1)||qty);
            curArea.items.push({desc:name, qty:q, unit, unitCost:cost, include:true});
          }
        }
      }
    }

    const validAreas=areas.filter(a=>a.items.length>0);
    if(!validAreas.length){ alert('No areas or items were found. Make sure this is a ZZTakeoff export.'); return; }
    showZZImportModal(validAreas);
  } catch(e){ if(e.name!=='AbortError') alert('Import error: '+e.message); }
}

function showZZImportModal(areas){
  // Build preview table grouped by area
  let bodyHtml='';
  areas.forEach((area,ai)=>{
    const areaTotal=area.items.reduce((s,it)=>s+(it.qty*it.unitCost),0);
    bodyHtml+=`
      <tr style="background:#1E3A5F">
        <td style="padding:5px 8px">
          <input type="checkbox" id="area_${ai}" checked onchange="zzToggleArea(${ai},this.checked)">
        </td>
        <td colspan="4" style="padding:5px 8px;color:#fff;font-weight:700;font-size:12px">
          📁 ${esc(area.name)}
        </td>
        <td style="padding:5px 8px;color:#aac8e0;text-align:right;font-weight:700">${fmt$(areaTotal)}</td>
      </tr>`;
    area.items.forEach((it,ii)=>{
      bodyHtml+=`
        <tr class="zzrow" data-area="${ai}" data-item="${ii}">
          <td style="padding:3px 8px 3px 24px">
            <input type="checkbox" id="item_${ai}_${ii}" checked>
          </td>
          <td style="padding:3px 6px;font-size:11px">${esc(it.desc)}</td>
          <td style="padding:3px 6px;font-size:11px;text-align:right">${it.qty}</td>
          <td style="padding:3px 6px;font-size:11px">${esc(it.unit)}</td>
          <td style="padding:3px 6px;font-size:11px;text-align:right">$${it.unitCost.toLocaleString()}</td>

        </tr>`;
    });
  });

  const modal=document.createElement('div');
  modal.className='modal-overlay'; modal.id='zzModal';
  modal.innerHTML=`<div class="modal" style="max-width:720px">
    <div class="modal-head">
      <h2>ZZTakeoff Import — ${areas.length} Areas, ${areas.reduce((n,a)=>n+a.items.length,0)} Items</h2>
      <button class="btn-sec" style="padding:4px 10px" onclick="document.getElementById('zzModal').remove()">✕</button>
    </div>
    <div class="modal-body" style="padding:0">
      <div style="padding:10px 14px;background:#f5f7fa;border-bottom:1px solid #dde2ea;font-size:11px;color:#666">
        Each ZZTakeoff folder becomes a separate <strong>Area</strong> in the estimator. Uncheck items or areas to exclude them.
      </div>
      <table class="match-table" style="width:100%">
        <thead><tr style="background:#eef3f9">
          <th style="width:32px"></th><th>Description</th>
          <th style="width:60px;text-align:right">Qty</th>
          <th style="width:65px">Unit</th>
          <th style="width:75px;text-align:right">Unit $</th>
          <th style="width:80px;text-align:right">Total</th>
        </tr></thead>
        <tbody>${bodyHtml}</tbody>
      </table>
    </div>
    <div class="modal-foot">
      <button class="btn-sec" onclick="document.getElementById('zzModal').remove()">Cancel</button>
      <button class="btn-primary" id="zzConfirmBtn">Import into Estimator</button>
    </div>
  </div>`;
  document.body.appendChild(modal);

  modal.querySelector('#zzConfirmBtn').onclick=()=>{ doZZImport(areas, modal); };
}

// Called from area checkbox in modal
function zzToggleArea(ai, checked){
  document.querySelectorAll(`[id^="item_${ai}_"]`).forEach(cb=>{ cb.checked=checked; });
}

function doZZImport(areas, modal){
  let totalImported=0, areasCreated=0;
  for(const [ai, area] of areas.entries()){
    const checkedItems=area.items.filter((_,ii)=>{
      const cb=document.getElementById(`item_${ai}_${ii}`);
      return cb&&cb.checked;
    });
    if(!checkedItems.length) continue;

    // Create new area in estimator
    const areaId=uid(); const secId=uid();
    const newArea={id:areaId, name:area.name, qty:1, ignore:false, noPrint:false,
      sections:[{id:secId, name:'Casework', ignore:false, noPrint:false, items:[]}]};
    const sec=newArea.sections[0];
    for(const it of checkedItems){
      sec.items.push({id:uid(), desc:it.desc, qty:it.qty, unit:it.unit, unitCost:it.unitCost, drawingRef:'', ignore:false, noPrint:false});
      totalImported++;
    }
    ST.areas.push(newArea);
    areasCreated++;
  }
  if(!totalImported){ alert('No items were checked.'); return; }

  // Navigate to first imported area
  const firstNew=ST.areas[ST.areas.length-areasCreated];
  ST.sel.view='area'; ST.sel.areaId=firstNew.id; ST.sel.sectionId=firstNew.sections[0].id;
  markDirty(); modal.remove(); render();
  alert(`Imported ${totalImported} items across ${areasCreated} area${areasCreated>1?'s':''}.`);
}

// ══════════════════════════════════════════════════════════════
// PDF EXPORT  (matches FS_Proposal_Generator format exactly)
// ══════════════════════════════════════════════════════════════
async function exportPDF(){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:"mm", format:"letter", orientation:"portrait"});
  const I  = ST.info;
  const bid = calcBid();
  const ohFactor = 1 + pct(ST.ohPct)/100;

  // Layout constants (matching generator)
  const LM=19, RM=192, CW=RM-LM, BM=275;
  const cDesc=LM, cRef=LM+96, cQty=LM+124, cUnit=LM+135, cPrice=RM;
  let y=15;

  // ── Helpers ───────────────────────────────────────────────
  function txt(x,yy,str,opts={}){
    if(!str&&str!==0) return;
    doc.setFontSize(opts.size||8.5);
    doc.setFont('helvetica', opts.bold&&opts.italic?'bolditalic':opts.bold?'bold':opts.italic?'italic':'normal');
    doc.setTextColor(...(opts.color||[0,0,0]));
    if(opts.align==='right') doc.text(String(str),x,yy,{align:'right'});
    else doc.text(String(str),x,yy,{maxWidth:opts.maxWidth||undefined});
  }
  function hline(yy,x0,x1,lw,gray){
    doc.setDrawColor(gray?153:0); doc.setLineWidth(lw||0.3);
    doc.line(x0||LM,yy,x1||RM,yy);
  }
  function fillRect(x,yy,w,h,r,g,b){
    doc.setFillColor(r||217,g||217,b||217); doc.rect(x,yy,w,h,'F');
  }
  function checkY(space){
    if(y+space>BM){ doc.addPage(); y=15;
      txt(LM,y,'Form and Structure, Inc.  '+(I.docType||'Proposal'),{bold:true,size:9.5}); y+=4.5;
      txt(LM,y,(I.id?I.id+' - ':'')+I.name+'    Date  '+I.bidDate,{size:8.5});
      txt(RM,y,'Continued…',{size:8.5,align:'right'}); y+=4.5;
      txt(LM,y,I.client,{size:8.5}); y+=3.5; hline(y,LM,RM,0.5); y+=5.5;
    }
  }
  function newPage(){
    doc.addPage(); y=15;
  }

  // ─────────────────────────────────────────────────────────
  // PAGE 1
  // ─────────────────────────────────────────────────────────

  // Logo (top-left)
  const logoW=56, logoH=logoW*(219/800);
  doc.addImage('data:image/jpeg;base64,'+LOGO_B64,'JPEG',LM,y,logoW,logoH);

  // Company address (top-right)
  const ax=RM, ay=y+1;
  [{t:'Form and Structure, Inc.',b:true},{t:'10708 NE 2nd Ave'},
   {t:'Portland, OR 97211'},{t:'Tel: (503) 289-9204'},{t:'CCB# 52938'}]
  .forEach((l,i)=>txt(ax,ay+i*3.8,l.t,{size:7.5,bold:l.b,align:'right'}));
  y+=Math.max(logoH,18)+3;

  // Doc type title + date
  txt(LM,y,I.docType||'Proposal',{size:16,bold:true});
  txt(RM,y,'Date  '+(I.bidDate||''),{size:9,align:'right'});
  y+=5; hline(y,LM,RM,0.5); y+=5;

  // To: block
  txt(LM,y,'To:',{bold:true,size:9});
  const tx=LM+7;
  txt(tx,y,I.client,{bold:true,size:9}); y+=4.5;
  if(I.address){ const parts=I.address.split(','); parts.forEach(p=>{ txt(tx,y,p.trim(),{size:9}); y+=4.5; }); }
  y+=2; hline(y,LM,RM,0.25,true); y+=4.5;

  // Info table (2-column)
  const c1l=LM, c1v=LM+23, c2l=LM+CW/2, c2v=LM+CW/2+23;
  [
    ['Attention :',  I.attention||'',   'Project Id :',  I.id||''],
    ['Project Desc.:',I.name||'',       'Ship Via :',    I.shipVia||'Truck'],
    ['Terms :',      I.terms||'Net 30', 'P.O. Number :', I.poNumber||'n/a'],
    ['Delivery Date:',I.deliveryDate||'','Estimator :',  I.estimator||''],
  ].forEach(([l1,v1,l2,v2])=>{
    txt(c1l,y,l1,{bold:true,size:7.5}); txt(c1v,y,v1,{size:7.5});
    txt(c2l,y,l2,{bold:true,size:7.5}); txt(c2v,y,v2,{size:7.5});
    y+=4.5;
  });
  y+=2; hline(y,LM,RM,0.5); y+=5;

  // Column headers
  fillRect(LM,y-3.2,CW,5.2);
  [{x:cDesc,t:'Description',a:'left'},{x:cRef,t:'Drawing Ref',a:'left'},
   {x:cQty,t:'Qty',a:'right'},{x:cUnit,t:'Unit',a:'left'},{x:cPrice,t:'Price',a:'right'}]
  .forEach(c=>txt(c.x,y,c.t,{bold:true,size:7.5,align:c.a}));
  y+=5.2; hline(y,LM,RM,0.4); y+=3;

  // Project info block (bid docs, architect, etc.)
  [[I.name?I.name.toUpperCase():'','PROJECT:'],
   [I.bidDocs,'Bid Documents:'],
   [I.architect,'Architect:'],
   [I.drawingsDated,'Drawings Dated:'],
   [I.specsDated,'Specifications Dated:'],
   [I.addendums,'Addendums:'],
  ].forEach(([v,l])=>{
    if(!v) return;
    txt(cDesc,y,l,{bold:true,size:7.5}); txt(cDesc+38,y,v,{size:7.5}); y+=4;
  });
  y+=2;

  // ── LINE ITEMS ────────────────────────────────────────────
  const mode=ST.pricingMode||'byarea';
  const subTotal=ST.subItems.reduce((s,it)=>s+(it.cost||0)*(1+(it.markupPct||0)/100),0);
  // matOh includes overhead; subTotal already has markup
  const lineTotal = bid.matOh + subTotal;

  if(mode==='lumpsum'){
    checkY(6);
    txt(cDesc,y,I.name||'Base Scope of Work',{size:8.5});
    txt(cQty,y,'1',{size:8.5,align:'right'});
    txt(cUnit,y,'lump sum',{size:8.5});
    txt(cPrice,y,fmt$(bid.matOh),{size:8.5,align:'right'});
    y+=5;

  } else if(mode==='byarea'){
    for(const area of ST.areas){
      if(area.noPrint) continue;
      checkY(8);
      const aT = areaTotal(area)*ohFactor;
      const aQty = area.qty||1;
      txt(cDesc,y,area.name||'Area',{bold:true,size:8.5});
      txt(cQty,y,String(aQty),{size:8.5,align:'right'});
      txt(cUnit,y,aQty>1?'rooms':'lump sum',{size:8.5});
      txt(cPrice,y,fmt$(aT),{size:8.5,align:'right'});
      y+=5;
    }

  } else {
    // Itemized
    for(const area of ST.areas){
      if(area.noPrint) continue;
      checkY(10);
      txt(cDesc,y,area.name||'Area',{bold:true,size:8.5}); y+=4.5;
      for(const sec of area.sections){
        if(sec.noPrint) continue;
        for(const item of sec.items){
          if(item.noPrint) continue;
          checkY(5);
          txt(cDesc,y,'  '+(item.desc||'—'),{size:7.5,maxWidth:90});
          if(item.drawingRef) txt(cRef,y,item.drawingRef,{size:7.5,maxWidth:28});
          txt(cQty,y,String(item.qty),{size:7.5,align:'right'});
          txt(cUnit,y,item.unit||'',{size:7.5});
          txt(cPrice,y,fmt$(itemTotal(item)*ohFactor),{size:7.5,align:'right'});
          y+=4.2;
        }
      }
      txt(cDesc,y,'  '+area.name+' Subtotal',{italic:true,size:7.5});
      txt(cPrice,y,fmt$(areaTotal(area)*ohFactor),{italic:true,size:7.5,align:'right'});
      y+=4.2; y+=2;
    }
  }

  // Supplier / sub items
  if(ST.subItems.length>0){
    ST.subItems.forEach(it=>{
      if(!it.desc&&!it.cost) return;
      checkY(6);
      const p=it.cost*(1+it.markupPct/100);
      txt(cDesc,y,it.desc||'Supplier Item',{size:8.5});
      txt(cQty,y,'1',{size:8.5,align:'right'});
      txt(cUnit,y,'lump sum',{size:8.5});
      txt(cPrice,y,fmt$(p),{size:8.5,align:'right'});
      y+=5;
    });
  }

  hline(y,LM,RM,0.25,true); y+=4.5;

  // D&I line
  const diTotal=Math.round((bid.delAmt+bid.insAmt)*100)/100;
  if(diTotal>0){
    const lbl=bid.delAmt>0&&bid.insAmt>0?'Delivery & Installation':bid.delAmt>0?'Delivery':'Installation';
    txt(cDesc,y,lbl,{size:8.5});
    txt(cQty,y,'1',{size:8.5,align:'right'});
    txt(cUnit,y,'job',{size:8.5});
    txt(cPrice,y,fmt$(diTotal),{size:8.5,align:'right'});
    y+=4.8;
  }
  hline(y,LM,RM,0.5); y+=4.5;

  // Base Bid
  const totalBid=bid.total+subTotal;
  txt(cDesc,y,'Base Bid',{bold:true,size:10});
  txt(cQty,y,'1',{bold:true,size:10,align:'right'});
  txt(cUnit,y,'$',{bold:true,size:10});
  txt(cPrice,y,fmt$(totalBid),{bold:true,size:10,align:'right'});
  y+=6; hline(y,LM,RM,0.8); y+=6;

  // Alternates
  if(ST.altItems.length>0){
    txt(LM,y,'ALTERNATES',{bold:true,size:8.5}); y+=4.5;
    ST.altItems.forEach((alt,i)=>{
      checkY(6);
      const aT=Math.round((alt.price||0)*(alt.qty||1)*100)/100;
      txt(cDesc,y,'Alternate No. '+(i+1)+':  '+(alt.desc||''),{size:8.5});
      txt(cQty,y,String(alt.qty||1),{size:8.5,align:'right'});
      txt(cUnit,y,alt.unit||'lump sum',{size:8.5});
      txt(cPrice,y,fmt$(aT),{size:8.5,align:'right'});
      y+=5;
    });
    y+=3;
  }

  // Exclusions (remainder of page 1)
  txt(LM,y,'Exclusions / Clarifications',{bold:true,size:8.5}); y+=5;
  txt(LM,y,'EXCLUSIONS',{bold:true,size:8.5}); y+=4.5;
  (ST.exclusions||[]).filter(e=>e.active).forEach(({text:line})=>{
    if(y>BM-3) return;
    txt(LM+3,y,line,{size:7.5}); y+=3.8;
  });

  // ─────────────────────────────────────────────────────────
  // PAGE 2
  // ─────────────────────────────────────────────────────────
  newPage();
  txt(LM,y,'Form and Structure, Inc.  '+(I.docType||'Proposal'),{bold:true,size:9.5}); y+=4.5;
  txt(LM,y,(I.id?I.id+' - ':'')+I.name+'    Date  '+I.bidDate,{size:8.5});
  txt(RM,y,'Page No. 2 of 2 Pages',{size:8.5,align:'right'}); y+=4.5;
  txt(LM,y,I.client,{size:8.5}); y+=3.5;
  hline(y,LM,RM,0.5); y+=5.5;

  function section(title,lines){
    checkY(8);
    txt(LM,y,title,{bold:true,size:8.5}); y+=4.5;
    lines.forEach(line=>{
      checkY(4);
      txt(LM+3,y,line.replace(/\\'/g,'\u2019'),{size:7.5}); y+=3.8;
    });
    y+=3;
  }

  section('CLARIFICATIONS:',(ST.clarifications||[]).filter(e=>e.active).map(e=>e.text));
  if((ST.generalTerms||[]).some(e=>e.active))   section('GENERAL TERMS:',(ST.generalTerms||[]).filter(e=>e.active).map(e=>e.text));
  if((ST.warranty||[]).some(e=>e.active))        section('WARRANTY AND FABRICATION:',(ST.warranty||[]).filter(e=>e.active).map(e=>e.text));
  if((ST.finishTerms||[]).some(e=>e.active))     section('FINISH MATERIALS:',(ST.finishTerms||[]).filter(e=>e.active).map(e=>e.text));
  if((ST.hardwareTerms||[]).some(e=>e.active))   section('HARDWARE ASSUMPTIONS:',(ST.hardwareTerms||[]).filter(e=>e.active).map(e=>e.text));
  if((ST.fabNote||[]).some(e=>e.active))         section('FABRICATION NOTE:',(ST.fabNote||[]).filter(e=>e.active).map(e=>e.text));

  y+=4;
  txt(LM,y,'Please Note: Prices valid for 30 days.',{italic:true,size:7.5}); y+=7;
  hline(y,LM,LM+64,0.4); y+=4;
  txt(LM,y,'Authorized Signature',{size:7.5});

  // ── Save ──────────────────────────────────────────────────
  // Finish schedule page
  if(ST.finishSchedule&&(ST.finishSchedule.printOnProposal||ST.finishSchedule.printOnWorksheet)) _pdfFinishSchedulePage(doc,I);

  function slug(s){ return (s||'').replace(/[^a-zA-Z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'').slice(0,30); }
  const dp=(I.bidDate||'').split('/');
  const dateStr=dp.length>=2?parseInt(dp[0],10)+'.'+dp[1]:(I.bidDate||'').replace(/\//g,'.');
  const filename=`${slug(I.client)||'Client'}_${slug(I.name)||'Proposal'}_${dateStr}.pdf`;
  doc.save(filename);
}

// LIBRARY FILE PERSISTENCE + EDITOR
// ══════════════════════════════════════════════════════════════
async function initLibFile(){
  const handle = await _idbGet('library');
  if(!handle) return;
  try{
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm==='granted'){
      _libHandle=handle; _libLinked=true;
      const file=await handle.getFile();
      const data=JSON.parse(await file.text());
      if(Array.isArray(data)&&data.length) _libCache=data;
      rebuildLibCats(); filterLib();
    } else {
      _libHandle=handle; _libLinked=false;
    }
  }catch(e){ _libHandle=null; _libLinked=false; }
}

async function _writeLibFile(){
  if(!_libHandle) return;
  try{
    const perm=await _libHandle.requestPermission({mode:'readwrite'});
    if(perm!=='granted') return;
    _libLinked=true;
    const w=await _libHandle.createWritable();
    await w.write(JSON.stringify(_libCache,null,2));
    await w.close();
  }catch(e){ console.warn('Library write failed:',e); }
}

async function _linkLibFile(isNew){
  try{
    let handle;
    if(isNew){
      handle=await window.showSaveFilePicker({suggestedName:'fs_library.json',types:[{description:'FS Library',accept:{'application/json':['.json']}}]});
      const w=await handle.createWritable();
      await w.write(JSON.stringify(_libCache,null,2));
      await w.close();
    } else {
      [handle]=await window.showOpenFilePicker({types:[{description:'FS Library',accept:{'application/json':['.json']}}]});
      const file=await handle.getFile();
      const data=JSON.parse(await file.text());
      if(Array.isArray(data)&&data.length) _libCache=data;
    }
    _libHandle=handle; _libLinked=true;
    await _idbSet('library',handle);
    rebuildLibCats(); filterLib();
    _renderLibModal('list',null);
  }catch(e){ if(e.name!=='AbortError') alert('Could not link library file: '+e.message); }
}

function openLibEditor(){ _renderLibModal('list',null); }

function _libFileStatusHtml(){
  if(_libLinked) return `<div class="contacts-file-status linked">📁 Synced to fs_library.json — changes save automatically</div>`;
  if(_libHandle) return `<div class="contacts-file-status prompt" onclick="_linkLibFile(false)">⚠️ File linked but needs permission — click to reconnect</div>`;
  return `<div class="contacts-file-status unlinked"><span>Browser-only — not saved to file</span>
    <span style="display:flex;gap:6px;margin-top:4px">
      <button class="btn-sec" style="padding:4px 10px;font-size:11px" onclick="_linkLibFile(false)">Open existing</button>
      <button class="btn-primary" style="padding:4px 10px;font-size:11px" onclick="_linkLibFile(true)">Create library.json</button>
    </span></div>`;
}

      `:`
        <button class="btn-sec" onclick="if(confirm('Reset library to built-in defaults?')){_libCache=PRICE_LIB_DEFAULT.map(it=>Object.assign({},it));_writeLibFile();rebuildLibCats();filterLib();_renderLibModal('list',null);}">Reset to Defaults</button>
